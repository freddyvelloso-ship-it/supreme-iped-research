# Nginx — SENTINELA reverse proxy
# Substitua SEU_DOMINIO.com pelo dominio real antes de ativar.
# Certbot ira adicionar os blocos SSL automaticamente.

server {
    listen 80;
    server_name SEU_DOMINIO.com;

    # Certbot vai substituir este bloco pelo redirect HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name SEU_DOMINIO.com;

    # Certificados gerados pelo Certbot
    # ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Seguranca
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;

    # Tamanho maximo de upload (para payloads de ingest)
    client_max_body_size 2M;

    # Proxy para o FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (para futuras atualizacoes em tempo real)
    location /ws {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
