services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      supreme-api:
        condition: service_healthy
      sentinela:
        condition: service_healthy
    networks:
      - backend

  supreme-db:
    ports:
      - "15433:5432"

  sentinela-db:
    ports:
      - "15434:5432"

  supreme-redis:
    ports:
      - "16379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  supreme-api:
    ports:
      - "18000:8000"
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --workers 1
    environment:
      ENVIRONMENT: local
      ENABLE_DOCS: "true"
      ENABLE_METRICS: "true"
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://supreme:${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}@supreme-db:5432/supreme
      REDIS_URL: redis://:${REDIS_PASSWORD:?defina REDIS_PASSWORD}@supreme-redis:6379/0
      SENTINELA_URL: http://sentinela:8001
      SENTINELA_API_KEY: ${SENTINELA_API_KEY:?defina SENTINELA_API_KEY}

  supreme-worker:
    command: rq worker analytics dead_letter --url redis://:${REDIS_PASSWORD:?defina REDIS_PASSWORD}@supreme-redis:6379/0
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+asyncpg://supreme:${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}@supreme-db:5432/supreme
      REDIS_URL: redis://:${REDIS_PASSWORD:?defina REDIS_PASSWORD}@supreme-redis:6379/0
      SENTINELA_URL: http://sentinela:8001
      SENTINELA_API_KEY: ${SENTINELA_API_KEY:?defina SENTINELA_API_KEY}

  sentinela:
    ports:
      - "18001:8001"
    environment:
      ENVIRONMENT: local
      ENABLE_DOCS: "true"
      AUTO_INIT_DB: "false"
      DATABASE_URL: postgresql+asyncpg://sentinela:${SENTINELA_POSTGRES_PASSWORD:?defina SENTINELA_POSTGRES_PASSWORD}@sentinela-db:5432/sentinela

  grafana:
    environment:
      GF_SERVER_ROOT_URL: https://localhost/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"

  prometheus:
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle

  mailpit:
    image: axllent/mailpit:v1.22
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - backend

  loki:
    user: "0:0"
    ports:
      - "3101:3100"

  # Reads supreme_audit.ndjson generated by the real IPED patch.
  supreme-iped-watcher:
    build:
      context: ./supreme-iped-integration
      dockerfile: Dockerfile
    command: python supreme-watcher/watcher.py
    restart: unless-stopped
    environment:
      SUPREME_API_URL: http://supreme-api:8000
      SUPREME_API_TOKEN: ${API_INGEST_TOKEN:?defina API_INGEST_TOKEN}
      SUPREME_SALT: ${SUPREME_SALT:?defina SUPREME_SALT}
      SUPREME_AUDIT_LOG: /audit/supreme_audit.ndjson
      WATCHER_POLL_SECS: "15"
      SUPREME_USER_ID: perito_local
    volumes:
      - ${IPED_AUDIT_DIR:-./tmp/iped-audit}:/audit:ro
    networks:
      - backend
    depends_on:
      supreme-api:
        condition: service_healthy

  # Optional local proxy for IPED Web API. The deterministic E2E does not depend on it.
  supreme-iped-proxy:
    build:
      context: ./supreme-iped-integration
      dockerfile: Dockerfile
    command: python supreme-proxy/proxy.py
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      IPED_API_URL: http://host.docker.internal:1234
      PROXY_PORT: "8081"
      SUPREME_API_URL: http://supreme-api:8000
      SUPREME_API_TOKEN: ${API_INGEST_TOKEN:?defina API_INGEST_TOKEN}
      SUPREME_SALT: ${SUPREME_SALT:?defina SUPREME_SALT}
      SUPREME_AUDIT_LOG: /audit/supreme_audit.ndjson
      SUPREME_USER_ID: perito_local
    volumes:
      - ${IPED_AUDIT_DIR:-./tmp/iped-audit}:/audit:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - backend
    depends_on:
      supreme-api:
        condition: service_healthy

networks:
  backend:
    driver: bridge
