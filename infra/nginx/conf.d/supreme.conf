server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name _;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;

  location = / {
    return 302 /sentinela/;
  }

  location /health {
    proxy_pass http://supreme-api:8000/health;
  }

  # Formularios psicometricos (abertos pelo launcher)
  location /forms/ {
    proxy_pass http://supreme-api:8000/forms/;
    # Sem X-Frame-Options para permitir abertura em janela pelo launcher
  }

  location /v1/events/ingest {
    limit_req zone=api burst=50 nodelay;
    proxy_pass http://supreme-api:8000;
  }

  location /v1/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://supreme-api:8000;
  }

  location /sentinela/ {
    proxy_pass http://sentinela:8001/;
  }

  location /grafana/ {
    proxy_pass http://grafana:3000/;
  }
}
